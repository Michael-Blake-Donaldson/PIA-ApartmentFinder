spring:
  application:
    name: pia-backend

  # ===== Database =====
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pia_db}
    username: ${DB_USERNAME:pia_user}
    password: ${DB_PASSWORD:changeme_strong_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway manages the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Batch inserts for snapshot writes
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ===== Mail =====
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # ===== WebFlux (WebClient) =====
  webflux:
    base-path: /

  # ===== Scheduling =====
  task:
    scheduling:
      pool:
        size: 5

# ===== Server =====
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ===== SpringDoc / Swagger =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  info:
    title: PIA API
    description: Private Investigator for Apartments — REST API
    version: 0.1.0

# ===== App-specific config =====
pia:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  mail:
    from: ${MAIL_FROM:noreply@pia.local}

  app:
    base-url: ${APP_BASE_URL:http://localhost:5173}
    name: ${APP_NAME:PIA}

  parser:
    request-timeout-seconds: ${PARSER_REQUEST_TIMEOUT_SECONDS:15}
    max-retries: ${PARSER_MAX_RETRIES:3}
    rate-limit-rps: ${PARSER_RATE_LIMIT_RPS:2}

  geocoding:
    provider: ${GEOCODING_PROVIDER:nominatim}
    nominatim-base-url: ${GEOCODING_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
    google-api-key: ${GEOCODING_GOOGLE_API_KEY:}

  admin:
    initial-email: ${ADMIN_INITIAL_EMAIL:admin@pia.local}
    initial-password: ${ADMIN_INITIAL_PASSWORD:changeme_admin_password}

  scheduler:
    listing-refresh-cron: "0 0 */6 * * *"   # Every 6 hours
    stale-check-cron: "0 30 2 * * *"          # 2:30 AM daily
    digest-email-cron: "0 0 8 * * *"          # 8 AM daily
